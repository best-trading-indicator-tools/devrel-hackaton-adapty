# Sync SMM PLANNING from Notion to data/notion-calendar.json
# Manual trigger only (temporarily disabled); commits updated JSON if changed
# Requires NOTION_API_KEY in repo Secrets (integration token from notion.so/my-integrations)
name: Notion Calendar Sync

permissions:
  contents: write

on:
  # Temporarily disabled: keep manual trigger only until NOTION_API_KEY is configured.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY || secrets.NOTION_TOKEN || vars.NOTION_API_KEY || vars.NOTION_TOKEN }}
      NOTION_DATA_SOURCE_ID: ${{ vars.NOTION_DATA_SOURCE_ID || secrets.NOTION_DATA_SOURCE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Validate Notion configuration
        run: |
          if [ -z "${NOTION_API_KEY}" ]; then
            echo "::error::Missing NOTION_API_KEY. Add repo secret NOTION_API_KEY (or NOTION_TOKEN)."
            exit 1
          fi

      - name: Sync Notion calendar
        run: npm run notion-sync

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notion-calendar.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: sync notion calendar"
            git push
          fi
