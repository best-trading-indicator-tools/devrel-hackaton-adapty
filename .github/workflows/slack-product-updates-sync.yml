# Sync #product-release from Slack to data/slack-product-updates.json
# Runs every 6 hours; commits updated JSON if changed
name: Slack Product Updates Sync

permissions:
  contents: write  # Required to push commits

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:  # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets['SLACK_BOT_TOKEN'] }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Sync Slack product updates
        run: npm run slack-sync

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/slack-product-updates.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: sync slack product updates"
            git push
          fi
