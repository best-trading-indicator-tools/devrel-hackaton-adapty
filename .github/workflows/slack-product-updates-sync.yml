# Sync #product-release from Slack to data/slack-product-updates.json
# Runs daily; commits updated JSON if changed
name: Slack Product Updates Sync

permissions:
  contents: write  # Required to push commits

on:
  schedule:
    - cron: "0 0 * * *"  # Daily at 00:00 UTC
  workflow_dispatch:  # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN || secrets.SLACK_TOKEN || vars.SLACK_BOT_TOKEN || vars.SLACK_TOKEN }}
      SLACK_PRODUCT_RELEASE_CHANNEL: ${{ vars.SLACK_PRODUCT_RELEASE_CHANNEL }}
      SLACK_WORKSPACE: ${{ vars.SLACK_WORKSPACE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Validate Slack configuration
        run: |
          if [ -z "${SLACK_BOT_TOKEN}" ]; then
            echo "::error::Missing SLACK_BOT_TOKEN. Add repo secret SLACK_BOT_TOKEN (or SLACK_TOKEN)."
            exit 1
          fi

      - name: Sync Slack product updates
        run: npm run slack-sync

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/slack-product-updates.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: sync slack product updates"
            git push
          fi
